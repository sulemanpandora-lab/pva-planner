<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PVA Sprint Capacity Planner 2026</title>
<style>
:root{--bg:#fff;--bg2:#f8f7f4;--bg3:#f1efe8;--bd:rgba(0,0,0,.10);--bd2:rgba(0,0,0,.20);--tx:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;--ac:#185fa5;--ac-bg:#e6f1fb;--ac-tx:#0c447c;--gn-bg:#eaf3de;--gn-tx:#3b6d11;--am-bg:#faeeda;--am-tx:#854f0b;--rd-bg:#fcebeb;--rd-tx:#a32d2d;--pu-bg:#eeedfe;--pu-tx:#3c3489;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#1e1e1c;--bg2:#252523;--bg3:#2c2c2a;--bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.18);--tx:#f1efe8;--tx2:#b4b2a9;--tx3:#888780;--ac:#85b7eb;--ac-bg:#0c447c;--ac-tx:#b5d4f4;--gn-bg:#27500a;--gn-tx:#c0dd97;--am-bg:#633806;--am-tx:#fac775;--rd-bg:#791f1f;--rd-tx:#f7c1c1;--pu-bg:#26215c;--pu-tx:#cecbf6}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--tx);font-size:14px;min-height:100vh}
header{background:var(--bg);border-bottom:.5px solid var(--bd2);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.lm{width:30px;height:30px;background:var(--ac);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px}
.lt{font-size:14px;font-weight:500}.ls{font-size:10px;color:var(--tx3)}
.hr{display:flex;gap:7px;flex-wrap:wrap}
.btn{padding:6px 13px;border-radius:var(--rs);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:12px;cursor:pointer;transition:background .1s;white-space:nowrap}
.btn:hover{background:var(--bg3)}.bp{background:var(--ac);color:#fff;border-color:transparent}.bp:hover{opacity:.9}
.bpu{background:var(--pu-bg);color:var(--pu-tx);border-color:transparent}.bpu:hover{opacity:.9}
.bam{background:var(--am-bg);color:var(--am-tx);border-color:transparent}.bam:hover{opacity:.9}
.tabs{background:var(--bg);border-bottom:.5px solid var(--bd);padding:0 22px;display:flex;overflow-x:auto}
.tab{padding:9px 16px;font-size:12px;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;white-space:nowrap;transition:all .1s}
.tab:hover{color:var(--tx);background:var(--bg2)}.tab.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:500}
.main{max-width:1320px;margin:0 auto;padding:18px 22px}
.snav{display:flex;align-items:center;gap:5px;margin-bottom:18px;overflow-x:auto;padding-bottom:3px;flex-wrap:wrap}
.ql{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-right:2px;white-space:nowrap}
.qsep{color:var(--bd2);font-size:14px;margin:0 2px}
.sc{padding:4px 11px;border-radius:20px;border:.5px solid var(--bd2);background:var(--bg);color:var(--tx2);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .1s}
.sc:hover{background:var(--bg3)}.sc.on{background:var(--ac);color:#fff;border-color:transparent}
.sc.dot::after{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:#97c459;margin-left:4px;vertical-align:middle}
.sc.modified{border-color:var(--am-tx);color:var(--am-tx)}
.sc.modified.on{background:var(--am-tx);color:#fff;border-color:transparent}
.sc.today{border-color:var(--gn-tx);color:var(--gn-tx);font-weight:500}
.sc.today::before{content:"";display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--gn-tx);margin-right:4px;vertical-align:middle}
.sc.today.on{background:var(--ac);color:#fff;border-color:transparent}
.sc.today.on::before{background:#fff;opacity:.7}
.srow{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;margin-bottom:18px}
.sc2{background:var(--bg);border-radius:var(--rs);border:.5px solid var(--bd);padding:11px 13px}
.sv{font-size:20px;font-weight:500}.sl{font-size:10px;color:var(--tx3);margin-top:2px}
.sc2.wn .sv{color:var(--am-tx)}.sc2.ok .sv{color:var(--gn-tx)}
.spsec{background:var(--bg);border-radius:var(--r);border:.5px solid var(--bd);padding:16px 18px;margin-bottom:18px}
.spsec h3{font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.spgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.spc{background:var(--bg2);border-radius:var(--rs);padding:11px 13px;border:.5px solid var(--bd)}
.spr{font-size:10px;color:var(--tx3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.spv{font-size:19px;font-weight:500}
.spbar{height:3px;border-radius:2px;background:var(--bg3);margin-top:5px}
.spfill{height:100%;border-radius:2px}
.alsec{background:var(--bg);border-radius:var(--r);border:.5px solid var(--bd);padding:16px 18px;margin-bottom:18px}
.alsec h3{font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.algrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.alrow{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;background:var(--bg2);border-radius:var(--rs);font-size:12px}
.alv{font-weight:500}
.cw{background:var(--bg);border-radius:var(--r);border:.5px solid var(--bd);overflow:hidden;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
th{background:var(--bg2);padding:6px 9px;font-size:9px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;text-align:left;border-bottom:.5px solid var(--bd)}
th.dc{text-align:center;min-width:30px;padding:4px 2px}
td{border-bottom:.5px solid var(--bd);padding:0;vertical-align:middle}
tr:last-child td{border-bottom:none}
.mc{padding:7px 11px;display:flex;align-items:center;gap:8px;min-width:180px}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0}
.mn{font-size:11px;font-weight:500}.mr{font-size:9px;color:var(--tx3)}
.guest-badge{font-size:8px;font-weight:500;padding:1px 5px;border-radius:3px;background:var(--pu-bg);color:var(--pu-tx);margin-left:4px;vertical-align:middle}
.student-badge{font-size:8px;font-weight:500;padding:1px 5px;border-radius:3px;background:var(--gn-bg);color:var(--gn-tx);margin-left:4px;vertical-align:middle}

/* FTE badge — clickable pill on each member row */
.fte-badge{display:inline-flex;align-items:center;gap:2px;font-size:8px;font-weight:500;padding:1px 6px;border-radius:3px;background:var(--am-bg);color:var(--am-tx);margin-left:5px;vertical-align:middle;cursor:pointer;border:.5px solid transparent;transition:all .1s;position:relative;white-space:nowrap}
.fte-badge:hover{border-color:var(--am-tx);opacity:.85}
.fte-badge.fte-half{background:var(--rd-bg);color:var(--rd-tx)}
.fte-badge.fte-full{display:none}

/* FTE dropdown popup */
.fte-popup{position:absolute;top:calc(100% + 4px);left:0;z-index:300;background:var(--bg);border:.5px solid var(--bd2);border-radius:var(--rs);box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:130px;padding:4px 0;display:none}
.fte-popup.open{display:block}
.fte-opt{display:block;width:100%;text-align:left;padding:6px 12px;font-size:11px;background:none;border:none;color:var(--tx);cursor:pointer;white-space:nowrap}
.fte-opt:hover{background:var(--bg2)}
.fte-opt.current{color:var(--ac);font-weight:500}
.fte-opt.reset{color:var(--tx3);font-size:10px;border-top:.5px solid var(--bd);margin-top:2px;padding-top:6px}

.dtd{text-align:center;padding:2px;border-right:.5px solid var(--bd);border-left:.5px solid var(--bd)}
.dtd+.dtd{border-left:none}.dtd:last-of-type{border-right:none}
.db{width:26px;height:26px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:9px;color:var(--tx3);margin:auto;display:flex;align-items:center;justify-content:center;transition:all .1s}
.db:hover{background:var(--ac-bg);color:var(--ac-tx)}.db.off{background:var(--rd-bg);color:var(--rd-tx);font-weight:700}.db.wknd{background:var(--bg2);cursor:not-allowed;color:var(--bd2)}
.cc{padding:6px 11px;min-width:85px;text-align:right}
.cl{font-size:11px;font-weight:500}
.cb{height:3px;border-radius:2px;background:var(--bg3);margin-top:3px}
.cf{height:100%;border-radius:2px;background:var(--ac)}
.cf.lo{background:#97c459}.cf.mi{background:#ef9f27}.cf.hi{background:#e24b4a}
.grp-hdr td{background:var(--bg3);padding:5px 11px;font-size:10px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;border-bottom:.5px solid var(--bd)}
.grp-hdr .add-guest-btn{float:right;font-size:10px;padding:1px 8px;border-radius:3px;border:.5px solid var(--bd2);background:var(--bg);color:var(--tx2);cursor:pointer;transition:background .1s;margin-top:-1px}
.grp-hdr .add-guest-btn:hover{background:var(--pu-bg);color:var(--pu-tx);border-color:transparent}
.mrow .del-btn{display:none;font-size:9px;padding:1px 5px;border-radius:3px;border:.5px solid var(--rd-tx);color:var(--rd-tx);background:transparent;cursor:pointer;margin-left:6px;vertical-align:middle;opacity:.6}
.mrow:hover .del-btn{display:inline}.mrow .del-btn:hover{opacity:1;background:var(--rd-bg)}
.leg{display:flex;gap:12px;align-items:center;padding:9px 12px;border-top:.5px solid var(--bd);background:var(--bg2);font-size:10px;color:var(--tx2);flex-wrap:wrap}
.ld{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.toast{position:fixed;bottom:18px;right:18px;background:var(--tx);color:var(--bg);padding:7px 14px;border-radius:var(--rs);font-size:11px;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;z-index:999;display:flex;align-items:center;gap:10px}
.toast.show{opacity:1;transform:translateY(0);pointer-events:auto}
.toast-undo{background:transparent;border:.5px solid rgba(255,255,255,.4);color:inherit;padding:2px 8px;border-radius:3px;font-size:10px;cursor:pointer;font-weight:500}
.toast-undo:hover{background:rgba(255,255,255,.15)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px}
.modal{background:var(--bg);border-radius:var(--r);border:.5px solid var(--bd2);padding:20px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:500;margin-bottom:12px}
.modal p{font-size:11px;color:var(--tx2);margin-bottom:8px;line-height:1.6}
.modal pre{background:var(--bg3);border-radius:var(--rs);padding:9px;font-size:10px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;margin-bottom:9px;border:.5px solid var(--bd)}
.mbtns{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.form-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.form-row input,.form-row select{flex:1;min-width:120px;padding:6px 10px;border-radius:var(--rs);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:12px}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--ac)}
.form-label{font-size:10px;font-weight:500;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.guest-list{margin-top:10px}
.guest-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg2);border-radius:var(--rs);margin-bottom:6px;font-size:12px}
.guest-item .rm{cursor:pointer;color:var(--rd-tx);font-size:11px;padding:2px 6px;border-radius:3px;border:.5px solid var(--rd-tx);background:transparent}
.guest-item .rm:hover{background:var(--rd-bg)}
.qblock{margin-bottom:22px}
.qlabel{font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:9px;text-transform:uppercase;letter-spacing:.5px}
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.dh{font-size:9px;color:var(--tx3);text-align:center}
.dd{font-size:8px;color:var(--bd2);text-align:center}
.sync-status{font-size:10px;color:var(--tx3);display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--tx3);flex-shrink:0}
.sync-dot.ok{background:#97c459}.sync-dot.err{background:#e24b4a}.sync-dot.busy{background:#ef9f27;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Holiday */
.hol-preview{background:var(--bg2);border-radius:var(--rs);border:.5px solid var(--bd);padding:10px 12px;margin-top:10px}
.hol-preview-hdr{font-size:10px;font-weight:500;color:var(--tx2);margin-bottom:6px}
.hol-sprint-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:.5px solid var(--bd);font-size:10px}
.hol-sprint-row:last-child{border-bottom:none}
.hol-days{color:var(--rd-tx);font-weight:500}

/* Sprint context */
.ctx-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
@media(max-width:800px){.ctx-grid{grid-template-columns:1fr}}
.ctx-panel{background:var(--bg);border-radius:var(--r);border:.5px solid var(--bd);overflow:hidden}
.ctx-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:.5px solid var(--bd);background:var(--bg3);gap:8px;flex-wrap:wrap}
.ctx-hdr h3{font-size:10px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}
.ctx-body{padding:12px 14px}

/* Release cards */
.rel-card{padding:10px 12px;border-radius:var(--rs);border:.5px solid var(--bd);margin-bottom:8px;background:var(--bg2)}
.rel-card:last-child{margin-bottom:0}
.rel-card.live-in-sprint{border-color:var(--am-tx);background:var(--am-bg)}
.rel-name{font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap}
.rbadge{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:500;white-space:nowrap}
.rbadge-pva{background:#185fa5;color:#fff}
.rbadge-platform{background:var(--bg3);color:var(--tx2);border:.5px solid var(--bd2)}
.rbadge-live{background:var(--am-bg);color:var(--am-tx)}
.rel-row{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--tx2);margin-bottom:3px}
.rel-row:last-child{margin-bottom:0}
.rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rdot-green{background:#97c459}.rdot-yellow{background:#ef9f27}
.rdot-blue{background:#185fa5}.rdot-purple{background:#7f77dd}
.rlabel{color:var(--tx3);min-width:76px;flex-shrink:0}
.rval{color:var(--tx);font-weight:500}
.rvers{font-size:9px;color:var(--tx3);margin-top:4px;font-family:monospace;line-height:1.5}
.rnote{font-size:9px;color:var(--tx2);margin-top:4px;line-height:1.4}
.no-rel{padding:20px;text-align:center;color:var(--tx3);font-size:11px}

/* Sprint notes */
.notes-area{width:100%;min-height:140px;border:.5px solid var(--bd2);border-radius:var(--rs);background:var(--bg2);color:var(--tx);font-size:12px;padding:10px 12px;line-height:1.6;resize:vertical;font-family:inherit}
.notes-area:focus{outline:none;border-color:var(--ac);background:var(--bg)}
.notes-hint{font-size:10px;color:var(--tx3);margin-top:6px;line-height:1.5}
.notes-saved{font-size:10px;color:var(--gn-tx);margin-top:4px;opacity:0;transition:opacity .3s}
.notes-saved.show{opacity:1}

/* Guest type toggle in modal */
.type-toggle{display:flex;gap:6px;margin-bottom:10px}
.type-btn{flex:1;padding:7px 10px;border-radius:var(--rs);border:.5px solid var(--bd2);background:var(--bg2);color:var(--tx2);font-size:11px;cursor:pointer;text-align:center;transition:all .1s}
.type-btn:hover{background:var(--bg3)}
.type-btn.active{background:var(--ac);color:#fff;border-color:transparent}
.type-btn.active.student{background:var(--gn-tx);border-color:transparent}

@media(max-width:680px){.main{padding:10px 12px}.mc{min-width:140px}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="lm">PVA</div>
    <div>
      <div class="lt">Sprint Capacity Planner 2026</div>
      <div class="ls">Pandora Digital · Agentforce · SM: Suleman Malik</div>
    </div>
  </div>
  <div class="hr">
    <div class="sync-status"><div class="sync-dot" id="sdot"></div><span id="slbl">Not synced</span></div>
    <button class="btn" id="save-btn" style="background:var(--gn-bg);color:var(--gn-tx);border-color:transparent" onclick="syncToSheets()">Save</button>
    <button class="btn" onclick="loadFromSheets()" title="Load latest from Google Sheets">⟳ Load</button>
    <button class="btn bam" onclick="openHolidayModal()">Plan longer leave</button>
    <button class="btn bpu" onclick="openGuestModal()">+ Guests</button>
    <button class="btn" onclick="showShare()">Share</button>
    <button class="btn" onclick="clearAll()">Reset</button>
  </div>
</header>

<div class="tabs">
  <div class="tab on" onclick="switchTab('cap',this)">Capacity</div>
  <div class="tab"   onclick="switchTab('sp',this)">SP breakdown</div>
  <div class="tab"   onclick="switchTab('ov',this)">Quarter view</div>
</div>

<div class="main">
  <div class="snav" id="snav"></div>
  <div id="t-cap">
    <div class="srow" id="scards"></div>
    <div class="ctx-grid" id="ctx-grid"></div>
    <div class="cw"><table id="ctbl"></table></div>
  </div>
  <div id="t-sp" style="display:none">
    <div class="spsec"><h3>Story points available · feature development (70%)</h3><div class="spgrid" id="spgrid"></div></div>
    <div class="alsec"><h3>Capacity allocation model</h3><div class="algrid" id="algrid"></div></div>
  </div>
  <div id="t-ov" style="display:none"></div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>
<div id="ma"></div>

<script>
const PROXY_URL='https://script.google.com/macros/s/AKfycbzKZycM8lxvENB1x3ZQfhOorKkBfkLAKKCQhgzrUDqb1kanXL7dUPdQDastQ5K3gA7V/exec';

// ── DEFAULT SPRINTS ───────────────────────────────────────────────────────────
const DEFAULT_SPRINTS=[
  {id:'Q1-S1',l:'S1',q:'Q1',s:'2026-01-08',e:'2026-01-21'},
  {id:'Q1-S2',l:'S2',q:'Q1',s:'2026-01-22',e:'2026-02-04'},
  {id:'Q1-S3',l:'S3',q:'Q1',s:'2026-02-05',e:'2026-02-18'},
  {id:'Q1-S4',l:'S4',q:'Q1',s:'2026-02-19',e:'2026-03-04'},
  {id:'Q1-S5',l:'S5',q:'Q1',s:'2026-03-05',e:'2026-03-18'},
  {id:'Q2-S1',l:'S6',q:'Q2',s:'2026-03-19',e:'2026-04-01'},
  {id:'Q2-S2',l:'S7',q:'Q2',s:'2026-04-02',e:'2026-04-15'},
  {id:'Q2-S3',l:'S8',q:'Q2',s:'2026-04-16',e:'2026-04-29'},
  {id:'Q2-S4',l:'S9',q:'Q2',s:'2026-04-30',e:'2026-05-13'},
  {id:'Q2-S5',l:'S10',q:'Q2',s:'2026-05-14',e:'2026-05-27'},
  {id:'Q2-S6',l:'S11',q:'Q2',s:'2026-05-28',e:'2026-06-10'},
  {id:'Q3-S1',l:'S12',q:'Q3',s:'2026-06-11',e:'2026-06-24'},
  {id:'Q3-S2',l:'S13',q:'Q3',s:'2026-06-25',e:'2026-07-08'},
  {id:'Q3-S3',l:'S14',q:'Q3',s:'2026-07-09',e:'2026-07-22'},
  {id:'Q3-S4',l:'S15',q:'Q3',s:'2026-07-23',e:'2026-08-05'},
  {id:'Q3-S5',l:'S16',q:'Q3',s:'2026-08-06',e:'2026-08-19'},
  {id:'Q3-S6',l:'S17',q:'Q3',s:'2026-08-20',e:'2026-09-02'},
  {id:'Q3-S7',l:'S18',q:'Q3',s:'2026-09-03',e:'2026-09-16'},
  {id:'Q4-S1',l:'S19',q:'Q4',s:'2026-09-17',e:'2026-09-30'},
  {id:'Q4-S2',l:'S20',q:'Q4',s:'2026-10-01',e:'2026-10-14'},

let data={}, guests=[], deletedMembers=[], sprintDates={}, sprintNotes={}, fteOverrides={}, cur=null, tab='cap';

function getSprint(id){
  const def=DEFAULT_SPRINTS.find(s=>s.id===id);
  if(!def)return null;
  if(sprintDates[id])return {...def,...sprintDates[id]};
  return def;
}
function SPRINTS(){return DEFAULT_SPRINTS.map(s=>getSprint(s.id));}

// ── FTE HELPERS ───────────────────────────────────────────────────────────────
// Return effective FTE for a member (override takes precedence over base)
function getMemberFTE(m){
  if(fteOverrides[m.id]!==undefined)return fteOverrides[m.id];
  return m.f;
}
function setMemberFTE(mid,fte){
  const baseMember=BASE_GROUPS.flatMap(g=>g.members).find(m=>m.id===mid)
    ||guests.find(g=>g.id===mid);
  const baseF=baseMember?(baseMember.f||1.0):1.0;
  if(fte===baseF&&fteOverrides[mid]!==undefined){
    delete fteOverrides[mid];
  } else if(fte!==baseF){
    fteOverrides[mid]=fte;
  }
  sd();renderAll();syncToSheets();
}

function fteBadgeHtml(m){
  const fte=getMemberFTE(m);
  if(fte===1.0)return '';
  const pct=Math.round(fte*100);
  const cls=fte<=0.5?'fte-half':'';
  return `<span class="fte-badge ${cls}" onclick="openFTEPopup(event,'${m.id}')" title="Click to change FTE">${pct}%</span>`;
}

function openFTEPopup(e,mid){
  e.stopPropagation();
  // Close any open popups first
  document.querySelectorAll('.fte-popup.open').forEach(p=>p.classList.remove('open'));
  const badge=e.currentTarget;
  // Build popup
  const existing=document.getElementById('fte-popup-'+mid);
  if(existing){existing.classList.toggle('open');return;}
  const m=allMembers().find(x=>x.id===mid);
  const cur=getMemberFTE(m);
  const baseF=m.f||1.0;
  const allOpts=[
    {v:0.3,l:'30% — 1.5 days'},
    {v:0.5,l:'50% — half time'},
    {v:0.8,l:'80% — four days'},
    {v:1.0,l:'100% — full time'},
  ].map(o=>`<button class="fte-opt${cur===o.v?' current':''}" onclick="setMemberFTE('${mid}',${o.v});closeAllFTEPopups()">${o.l}</button>`).join('');
  const resetOpt=cur!==baseF?`<button class="fte-opt reset" onclick="setMemberFTE('${mid}',${baseF});closeAllFTEPopups()">Reset to default (${Math.round(baseF*100)}%)</button>`:'';
  const popup=document.createElement('div');
  popup.id='fte-popup-'+mid;
  popup.className='fte-popup open';
  popup.innerHTML=allOpts+resetOpt;
  badge.style.position='relative';
  badge.appendChild(popup);
}

function openFTEPopupForFull(e,mid){
  // Called from the member name area when FTE is currently 100% — show badge-less popup
  e.stopPropagation();
  document.querySelectorAll('.fte-popup.open').forEach(p=>p.classList.remove('open'));
  const anchor=e.currentTarget;

  if(existing){existing.remove();return;}

  const opts=[
    {v:0.3,l:'30% — 1.5 days'},
    {v:0.5,l:'50% — half time'},
    {v:0.8,l:'80% — four days'},
    {v:1.0,l:'100% — full time'},
  ].map(o=>`<button class="fte-opt${cur===o.v?' current':''}" onclick="setMemberFTE('${mid}',${o.v});closeAllFTEPopups()">${o.l}</button>`).join('');
  const resetOpt=(cur!==1.0||cur!==baseF)?`<button class="fte-opt reset" onclick="setMemberFTE('${mid}',1.0);closeAllFTEPopups()">100% — full time</button>`:'';

// ── SYNC ──────────────────────────────────────────────────────────────────────
function setSyncStatus(st,label){
  document.getElementById('sdot').className='sync-dot'+(st?' '+st:'');
  document.getElementById('slbl').textContent=label;
}
async function syncToSheets(){
  setSyncStatus('busy','Saving...');
  try{
    const r=await(await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'save',data:{data,guests,deleted:deletedMembers,sprintDates,sprintNotes,fteOverrides}}),redirect:'follow'})).json();
    if(r.ok){lastSynced=new Date();setSyncStatus('ok','Saved '+lastSynced.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));showToast('Saved to Google Sheets');}
    else{setSyncStatus('err','Save failed');showToast('Save failed: '+r.error);}
  }catch(e){setSyncStatus('err','Save failed');showToast('Save failed — '+e.message);}
}
async function loadFromSheets(){
  setSyncStatus('busy','Loading...');
  try{
    const r=await(await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'load'}),redirect:'follow'})).json();
    if(r.ok&&r.data){
      data=r.data.data||{};guests=r.data.guests||[];deletedMembers=r.data.deleted||[];
      sprintDates=r.data.sprintDates||{};sprintNotes=r.data.sprintNotes||{};fteOverrides=r.data.fteOverrides||{};
      sd();renderNav();renderCards();renderCtx();renderCal();
      if(tab==='sp')renderSP();if(tab==='ov')renderOV();
      lastSynced=new Date();setSyncStatus('ok','Loaded '+lastSynced.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
      showToast('Loaded from Google Sheets');
    }else if(r.ok&&!r.data){setSyncStatus('ok','Sheet is empty');showToast('No data yet — save first');}
    else{setSyncStatus('err','Load failed');showToast('Load failed: '+r.error);}
  }catch(e){setSyncStatus('err','Load failed');showToast('Load failed — '+e.message);}
}

function saveSprintDates(id){

  sprintDates[id]={s:from,e:to};
  sd();cm();
  if(cur&&cur.id===id){cur=getSprint(id);}
  renderAll();syncToSheets();
  showToast('Sprint dates updated');
}

function resetSprintDates(id){
  delete sprintDates[id];
  sd();cm();
  if(cur&&cur.id===id){cur=getSprint(id);}
  renderAll();syncToSheets();
  showToast('Sprint dates reset to default');
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function gs(sid,mid,ds){return data?.[sid]?.[mid]?.[ds]||null;}
function ss(sid,mid,ds,v){
  if(!data[sid])data[sid]={};if(!data[sid][mid])data[sid][mid]={};
  if(v===null)delete data[sid][mid][ds];else data[sid][mid][ds]=v;sd();
}
function dlist(sp){const a=[],d=new Date(sp.s),e=new Date(sp.e);while(d<=e){a.push(new Date(d));d.setDate(d.getDate()+1);}return a;}
function isWk(d){return d.getDay()===0||d.getDay()===6;}
function fd(d){return d.toISOString().slice(0,10);}
function fdisp(d){return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}
function fshort(ds){if(!ds)return'—';return new Date(ds).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}
function cap(sid,mid,dl){const w=dl.filter(d=>!isWk(d));const off=w.filter(d=>gs(sid,mid,fd(d))==='off').length;return{t:w.length,off,av:w.length-off};}
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}

function buildGroups(){
  const groups=BASE_GROUPS.map(g=>({...g,members:g.members.filter(m=>!deletedMembers.includes(m.id))}));
  guests.forEach(g=>{
    const grp=groups.find(gr=>gr.id===g.groupId);
    if(grp&&!grp.members.find(m=>m.id===g.id)){
      // Guest base FTE: students default 0.5, others 1.0
      const baseF=g.isStudent?0.5:1.0;
      grp.members.push({id:g.id,n:g.name,r:g.role||'Guest',sp:grp.sp,c:'#7f77dd',i:initials(g.name),f:baseF,isGuest:true,isStudent:g.isStudent||false});
    }
  });
  return groups.filter(g=>g.members.length>0);
}
function allMembers(){return buildGroups().flatMap(g=>g.members);}

function deleteMember(id,isGuest){
  if(isGuest){
    const saved=guests.find(g=>g.id===id);if(!saved)return;
    const s={...saved};guests=guests.filter(g=>g.id!==id);sd();renderAll();
    showToast(s.name+' removed',()=>{guests.push(s);sd();renderAll();showToast(s.name+' restored');});
  }else{
    const m=BASE_GROUPS.flatMap(g=>g.members).find(m=>m.id===id);if(!m)return;
    deletedMembers.push(id);sd();renderAll();
    showToast(m.n.split(' ')[0]+' removed',()=>{deletedMembers=deletedMembers.filter(d=>d!==id);sd();renderAll();showToast(m.n.split(' ')[0]+' restored');});
  }
}
function renderAll(){renderNav();renderCards();renderCtx();renderCal();if(tab==='sp')renderSP();if(tab==='ov')renderOV();}
function roleSP(sp,rid){
  const dl=dlist(sp),ms=allMembers().filter(m=>m.sp===rid);
  let h=0;ms.forEach(m=>{const c=cap(sp.id,m.id,dl);h+=c.av*8*getMemberFTE(m);});
  return Math.round(h*0.70/8*10)/10;
}
function totalSP(sp){return SP_ROLES.reduce((a,r)=>a+roleSP(sp,r.id),0);}

// ── TOAST WITH UNDO ───────────────────────────────────────────────────────────
function showToast(msg,undoFn,undoLabel='Undo'){
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  const old=t.querySelector('.toast-undo');if(old)old.remove();
  if(undoFn){
    const btn=document.createElement('button');
    btn.className='toast-undo';btn.textContent=undoLabel;
    btn.onclick=()=>{undoFn();t.classList.remove('show');};
    t.appendChild(btn);
  }
  t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),undoFn?8000:2000);
}

}

  const _n=new Date();
  const nowStr=_n.getFullYear()+'-'+String(_n.getMonth()+1).padStart(2,'0')+'-'+String(_n.getDate()).padStart(2,'0');
  const activeSprint=SPRINTS().find(s=>nowStr>=s.s&&nowStr<=s.e);
  let h='',lq=null;
  DEFAULT_SPRINTS.forEach(def=>{
    const s=getSprint(def.id);
    if(s.q!==lq){if(lq)h+='<span class="qsep">|</span>';h+=`<span class="ql">${s.q}</span>`;lq=s.q;}
    const hd=!!(data[s.id]&&Object.keys(data[s.id]).length>0);
    const on=cur&&cur.id===s.id?' on':'';
    const dot=hd&&!on?' dot':'';
    const mod=sprintDates[s.id]?' modified':'';
    const isToday=activeSprint&&activeSprint.id===s.id?' today':'';
    h+=`<button class="sc${on}${dot}${mod}${isToday}" onclick="pick('${s.id}')" title="${s.s} → ${s.e}${sprintDates[s.id]?' (custom dates)':''}${isToday?' · Current sprint':''}">${s.l}</button>`;
  });
  if(cur){
    h+=`<button class="btn" style="font-size:10px;padding:3px 9px;margin-left:6px" onclick="openEditSprintModal('${cur.id}')">Edit sprint dates</button>`;
  }
  document.getElementById('snav').innerHTML=h;
}

// ── SUMMARY CARDS ─────────────────────────────────────────────────────────────
function renderCards(){
  const dl=dlist(cur),wd=dl.filter(d=>!isWk(d)).length;
  const members=allMembers();let off=0;
  members.forEach(m=>{const c=cap(cur.id,m.id,dl);off+=c.off;});
  const tot=members.length*wd,av=tot-off,pct=Math.round(av/tot*100);
  const sp=Math.round(totalSP(cur));
  const cls=pct<70?'wn':pct>=90?'ok':'';
  const modBadge=sprintDates[cur.id]?`<div class="sc2" style="border-color:var(--am-tx)"><div class="sv" style="font-size:13px;color:var(--am-tx)">${fdisp(new Date(cur.s))}–${fdisp(new Date(cur.e))}</div><div class="sl">Custom dates</div></div>`:'';
  document.getElementById('scards').innerHTML=`
    <div class="sc2"><div class="sv">${members.length}</div><div class="sl">Team members</div></div>
    <div class="sc2"><div class="sv">${wd}</div><div class="sl">Working days</div></div>
    <div class="sc2 ${cls}"><div class="sv">${pct}%</div><div class="sl">Capacity</div></div>
    <div class="sc2"><div class="sv">${av}</div><div class="sl">Available days</div></div>
    <div class="sc2 ok"><div class="sv">${sp}</div><div class="sl">Est. SP (70%)</div></div>
    ${modBadge}`;
}

// ── SPRINT CONTEXT ─────────────────────────────────────────────────────────────
function relOverlapsSprint(rel,ss,se){
  const buf=2*86400000;
  const lo=new Date(ss).getTime()-buf,hi=new Date(se).getTime()+buf;
  return [rel.goLive,rel.branchCut,rel.translations2,rel.staging]
    .filter(Boolean).some(d=>new Date(d).getTime()>=lo&&new Date(d).getTime()<=hi);
}

function renderCtx(){
  const sp=cur;
  const relevant=RELEASES.filter(r=>relOverlapsSprint(r,sp.s,sp.e));
  let relHtml='';
  if(!relevant.length){relHtml=`<div class="no-rel">No releases in or around this sprint</div>`;}
  else{
    relevant.forEach(r=>{
      const inSprint=r.goLive&&r.goLive>=sp.s&&r.goLive<=sp.e;
      const cardCls=inSprint?'rel-card live-in-sprint':'rel-card';
      const bc=r.type==='pva'?'rbadge rbadge-pva':'rbadge rbadge-platform';
      let rows='';
      if(r.branchCut)    rows+=`<div class="rel-row"><div class="rdot rdot-green"></div><span class="rlabel">Branch cut</span><span class="rval">${fshort(r.branchCut)}</span></div>`;
      if(r.translations2)rows+=`<div class="rel-row"><div class="rdot rdot-yellow"></div><span class="rlabel">Translations</span><span class="rval">${fshort(r.translations2)}</span></div>`;
      if(r.staging)      rows+=`<div class="rel-row"><div class="rdot rdot-purple"></div><span class="rlabel">Staging / Go-No-Go</span><span class="rval">${fshort(r.staging)}</span></div>`;
      if(r.goLive)       rows+=`<div class="rel-row"><div class="rdot rdot-blue"></div><span class="rlabel">Go live</span><span class="rval">${fshort(r.goLive)}</span></div>`;
      const teamTxt=r.team?`<span style="font-size:9px;color:var(--tx3)">${r.team}</span>`:'';
      const liveBadge=inSprint?`<span class="rbadge rbadge-live" style="margin-left:auto">Go-live this sprint</span>`:'';
      relHtml+=`<div class="${cardCls}">
        <div class="rel-name"><span class="${bc}">${r.type==='pva'?'PVA':'Platform'}</span><strong>${r.label}</strong>${teamTxt}${liveBadge}</div>
        ${rows}
        ${r.versions?`<div class="rvers">${r.versions}</div>`:''}
        ${r.notes?`<div class="rnote">${r.notes}</div>`:''}
      </div>`;
    });
  }
  const note=sprintNotes[sp.id]||'';
  const notesHtml=`
    <textarea class="notes-area" id="sprint-notes-ta" placeholder="What is this sprint focused on? Add epics, blockers, release notes, goals…">${note}</textarea>
    <div class="notes-hint">Saved automatically · synced via Google Sheets</div>
    <div class="notes-saved" id="notes-saved">Saved</div>`;
  document.getElementById('ctx-grid').innerHTML=`
    <div class="ctx-panel">
      <div class="ctx-hdr">
        <h3>Release calendar — ${sp.l} (${fdisp(new Date(sp.s))} – ${fdisp(new Date(sp.e))})</h3>
        <a href="https://pandoradigital.atlassian.net/wiki/spaces/Architecture/pages/5564235896"
           target="_blank" style="font-size:10px;color:var(--ac);text-decoration:none">Full calendar ↗</a>
      </div>
      <div class="ctx-body">${relHtml}</div>
    </div>
    <div class="ctx-panel">
      <div class="ctx-hdr">
        <h3>Sprint notes — ${sp.l}</h3>
        <span style="font-size:10px;color:var(--tx3)">Free text · epics, goals, blockers</span>
      </div>
      <div class="ctx-body">${notesHtml}</div>
    </div>`;
  let notesTimer;
  const ta=document.getElementById('sprint-notes-ta');
  if(ta){
    ta.addEventListener('input',()=>{
      clearTimeout(notesTimer);
      notesTimer=setTimeout(()=>{
        sprintNotes[sp.id]=ta.value;sd();
        const saved=document.getElementById('notes-saved');
        if(saved){saved.classList.add('show');setTimeout(()=>saved.classList.remove('show'),1500);}
      },600);
    });
  }
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCal(){
  const dl=dlist(cur),s=cur,groups=buildGroups();
  let h=`<thead><tr><th>Member</th>`;
  dl.forEach(d=>{const wk=isWk(d);
    h+=`<th class="dc" style="${wk?'opacity:.3':''}"><div class="dh">${DAYS[d.getDay()]}</div><div class="dd">${d.getDate()}/${d.getMonth()+1}</div></th>`;
  });
  h+=`<th style="text-align:right;padding-right:11px">Cap.</th></tr></thead><tbody>`;
  groups.forEach(g=>{
    const gc=g.members.filter(m=>m.isGuest).length;
    const gn=gc>0?` <span style="color:var(--pu-tx);font-size:9px">(+${gc} guest${gc>1?'s':''})</span>`:'';
    h+=`<tr class="grp-hdr"><td colspan="${dl.length+2}">${g.label}${gn}<button class="add-guest-btn" onclick="openGuestModal('${g.id}')">+ Add guest</button></td></tr>`;
    g.members.forEach(m=>{
      const fte=getMemberFTE(m);
      const c=cap(s.id,m.id,dl);
      // Effective available days adjusted for FTE
      const avEff=Math.round(c.av*fte*10)/10;
      const pct=Math.round(avEff/(c.t*fte)*100);
      const fc=pct<60?'hi':pct<80?'mi':'lo';
      const gb=m.isGuest?'<span class="guest-badge">GUEST</span>':'';
      const sb=m.isStudent?'<span class="student-badge">STUDENT</span>':'';
      const db=`<button class="del-btn" onclick="deleteMember('${m.id}',${m.isGuest?'true':'false'})" title="Remove">✕</button>`;
      // FTE indicator: badge if <100%, or a subtle click target if 100%
      const fteBadge=fteBadgeHtml(m);
      const fteFullBtn=fte===1.0?`<span style="font-size:8px;color:var(--tx3);margin-left:5px;cursor:pointer;vertical-align:middle;opacity:0.5" onclick="openFTEPopupForFull(event,'${m.id}')" title="Change FTE">FTE</span>`:'';
      h+=`<tr class="mrow"><td><div class="mc"><div class="av" style="background:${m.c}22;color:${m.c}">${m.i}</div>
        <div style="flex:1"><div class="mn">${m.n}${gb}${sb}${db}${fteBadge}${fteFullBtn}</div><div class="mr">${m.r}</div></div></div></td>`;
      dl.forEach(d=>{
        if(isWk(d)){h+=`<td class="dtd"><button class="db wknd" disabled></button></td>`;return;}
        const ds=fd(d),st=gs(s.id,m.id,ds);
        h+=`<td class="dtd"><button class="db${st==='off'?' off':''}" onclick="tog('${s.id}','${m.id}','${ds}')">${st==='off'?'OFF':''}</button></td>`;
      });
      h+=`<td class="cc"><div class="cl">${avEff}/${Math.round(c.t*fte)}d</div><div class="cb"><div class="cf ${fc}" style="width:${pct}%"></div></div></td></tr>`;
    });
  });
  h+=`</tbody>`;
  const tbl=document.getElementById('ctbl');tbl.innerHTML=h;
  const old=tbl.parentElement.querySelector('.leg');if(old)old.remove();
  tbl.parentElement.insertAdjacentHTML('beforeend',`<div class="leg">
    <span>Click a day to toggle leave / OFF</span>
    <div style="display:flex;align-items:center;gap:4px"><div class="ld" style="background:var(--rd-bg);border:1px solid var(--rd-tx)"></div>Leave / OFF</div>
    <div style="display:flex;align-items:center;gap:4px"><div class="ld" style="background:var(--pu-bg);border:1px solid var(--pu-tx)"></div>Guest</div>
    <div style="display:flex;align-items:center;gap:4px"><div class="ld" style="background:var(--gn-bg);border:1px solid var(--gn-tx)"></div>Student</div>
    <span style="color:var(--tx3)">Sprint ${cur.l}: ${fdisp(new Date(cur.s))} → ${fdisp(new Date(cur.e))}</span>
    <span style="color:var(--tx3);margin-left:auto">Click <strong>FTE</strong> badge or "FTE" label to change allocation</span>
  </div>`);
}

function tog(sid,mid,ds){
  const v=gs(sid,mid,ds);ss(sid,mid,ds,v?null:'off');
  renderCards();renderCal();renderNav();if(tab==='sp')renderSP();
  syncToSheets();
  showToast(v?'Cleared':'Marked OFF');
}
function pick(id){cur=getSprint(id);renderNav();renderCards();renderCtx();renderCal();if(tab==='sp')renderSP();}

// ── SP BREAKDOWN ──────────────────────────────────────────────────────────────
function renderSP(){
  const dl=dlist(cur),ms=allMembers();
  const tot=Math.round(totalSP(cur)*10)/10;
  const mx=Math.max(...SP_ROLES.map(r=>roleSP(cur,r.id)),1);
  let h=`<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:18px;padding:14px 16px;background:var(--bg);border-radius:var(--r);border:.5px solid var(--bd)">
    <div style="font-size:32px;font-weight:500;color:var(--ac)">${tot}</div>
    <div style="font-size:13px;color:var(--tx2)">total story points available this sprint <span style="color:var(--tx3);font-size:11px">(70% feature allocation)</span></div>
  </div><div class="spgrid" style="margin-bottom:18px">`;
  SP_ROLES.forEach(r=>{
    const v=roleSP(cur,r.id),pct=Math.round(v/mx*100);
    const members=ms.filter(m=>m.sp===r.id);
    const rows=members.map(m=>{
      const fte=getMemberFTE(m);
      const c=cap(cur.id,m.id,dl);
      const msp=Math.round(c.av*fte*0.70*10)/10;
      const on=c.off>0?`<span style="color:var(--rd-tx);font-size:8px;margin-left:4px">${c.off}d off</span>`:'';
      const fteTxt=fte<1.0?`<span style="color:var(--am-tx);font-size:8px;margin-left:4px">${Math.round(fte*100)}%</span>`:'';
      return`<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:.5px solid var(--bd);font-size:10px">
        <span style="color:var(--tx2)">${m.n.split(' ')[0]}${on}${fteTxt}</span>
        <span style="font-weight:500;color:var(--tx)">${msp} SP</span></div>`;
    }).join('');
    h+=`<div class="spc"><div class="spr">${r.label}</div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:8px">
        <div class="spv" style="color:${r.color}">${v}</div><div style="font-size:10px;color:var(--tx3)">SP</div></div>
      ${rows}<div class="spbar" style="margin-top:8px"><div class="spfill" style="width:${pct}%;background:${r.color}"></div></div></div>`;
  });
  h+=`</div>`;
  document.getElementById('spgrid').innerHTML=h;
  document.getElementById('algrid').innerHTML=ALLOC.map(a=>`
    <div class="alrow"><span style="color:var(--tx2)">${a.l}</span><span class="alv">${Math.round(a.p*100)}% · ~${Math.round(tot*a.p/0.70)}SP</span></div>`).join('');
}

function renderOV(){
  const el=document.getElementById('t-ov');let h='';
  ['Q1','Q2','Q3','Q4'].forEach(q=>{
    const sps=DEFAULT_SPRINTS.filter(s=>s.q===q).map(s=>getSprint(s.id));
    h+=`<div class="qblock"><div class="qlabel">${q} 2026</div><div class="qgrid">`;
    sps.forEach(s=>{
      const dl=dlist(s),wd=dl.filter(d=>!isWk(d)).length,members=allMembers();
      let off=0;members.forEach(m=>{const c=cap(s.id,m.id,dl);off+=c.off;});
      const pct=Math.round((members.length*wd-off)/(members.length*wd)*100);
      const hd=!!(data[s.id]&&Object.keys(data[s.id]).length>0);
      const mod=!!sprintDates[s.id];
      const cls=hd?(pct<70?'wn':pct>=90?'ok':''):'';

      h+=`<div class="sc2 ${cls}" style="cursor:pointer;${mod?'border-color:var(--am-tx)':''}" onclick="pick('${s.id}');switchTab('cap',document.querySelectorAll('.tab')[0])">

        <div class="sv">${hd?pct+'%':'—'}</div>
        <div class="sl">${wd}d${mod?' · custom':''}${hasNote?' · notes':''}${hd?' planned':' no data'}</div>
      </div>`;
    });
    h+='</div></div>';
  });
  el.innerHTML=h;
}

    <div style="margin-bottom:10px">

      <div class="form-row"><select id="hol-member">${memberOpts}</select></div>
    </div>
    <div style="margin-bottom:10px">
      <div class="form-label">Leave period</div>
      <div class="form-row">
        <div style="flex:1"><div style="font-size:10px;color:var(--tx3);margin-bottom:3px">From</div>
          <input type="date" id="hol-from" min="2026-01-08" max="2026-12-23" onchange="previewHoliday()"/></div>
        <div style="flex:1"><div style="font-size:10px;color:var(--tx3);margin-bottom:3px">To</div>
          <input type="date" id="hol-to" min="2026-01-08" max="2026-12-23" onchange="previewHoliday()"/></div>
      </div>
    </div>
    <div id="hol-preview"></div>
    <div class="mbtns"><button class="btn" onclick="cm()">Cancel</button>
    <button class="btn bp" onclick="bookHoliday()">Confirm leave</button></div>
  </div></div>`;
}

function previewHoliday(){
  const from=document.getElementById('hol-from').value;
  const to=document.getElementById('hol-to').value;
  const mid=document.getElementById('hol-member').value;
  if(!from||!to||from>to){document.getElementById('hol-preview').innerHTML='';return;}
  const preview=calcHolidayDays(mid,from,to);
  if(!preview.length){document.getElementById('hol-preview').innerHTML='<div style="font-size:11px;color:var(--tx3);padding:8px 0">No working days found in this range</div>';return;}
  let rows=preview.map(p=>`<div class="hol-sprint-row"><span>${p.sprint}</span><span class="hol-days">-${p.days} day${p.days!==1?'s':''}</span></div>`).join('');
  const total=preview.reduce((a,p)=>a+p.days,0);
  document.getElementById('hol-preview').innerHTML=`<div class="hol-preview">
    <div class="hol-preview-hdr">Preview — ${total} working day${total!==1?'s':''} across ${preview.length} sprint${preview.length!==1?'s':''}</div>
    ${rows}
  </div>`;
}

function calcHolidayDays(mid,from,to){
  const result=[];
  SPRINTS().forEach(sp=>{
    const dl=dlist(sp);
    const affected=dl.filter(d=>{
      if(isWk(d))return false;
      const ds=fd(d);return ds>=from&&ds<=to&&gs(sp.id,mid,ds)!=='off';
    });
    if(affected.length>0)result.push({sprint:sp.l,days:affected.length,sprintId:sp.id,dates:affected.map(d=>fd(d))});
  });
  return result;
}

function bookHoliday(){
  const from=document.getElementById('hol-from').value;
  const to=document.getElementById('hol-to').value;
  const mid=document.getElementById('hol-member').value;
  if(!from||!to){showToast('Please select both dates');return;}
  if(from>to){showToast('End date must be after start date');return;}
  const preview=calcHolidayDays(mid,from,to);
  if(!preview.length){showToast('No working days to mark in this range');return;}
  const changes=[];
  preview.forEach(p=>{p.dates.forEach(ds=>{changes.push({sid:p.sprintId,mid,ds});ss(p.sprintId,mid,ds,'off');});});
  cm();renderAll();
  const total=preview.reduce((a,p)=>a+p.days,0);
  const memberName=allMembers().find(m=>m.id===mid)?.n.split(' ')[0]||'Member';
  syncToSheets();
  showToast(`${memberName}: ${total} days planned off`,()=>{
    changes.forEach(c=>ss(c.sid,c.mid,c.ds,null));renderAll();syncToSheets();showToast('Leave cancelled');
  },'Cancel leave');
}

function openGuestModal(pre){
  const opts=BASE_GROUPS.map(g=>`<option value="${g.id}"${g.id===pre?' selected':''}>${g.label}</option>`).join('');

    ?'<div style="font-size:11px;color:var(--tx3);text-align:center;padding:10px 0">No guests added yet</div>'
    :guests.map(g=>{
      const grp=BASE_GROUPS.find(gr=>gr.id===g.groupId);
      const typeBadge=g.isStudent
        ?'<span class="student-badge">STUDENT · 50%</span>'
        :'<span class="guest-badge">GUEST</span>';
      return`<div class="guest-item">
        <div>
          <span style="font-weight:500">${g.name}</span>
          <span style="color:var(--tx3);margin-left:6px">${g.role||'Guest'}</span>
          ${typeBadge}
          <span style="color:var(--pu-tx);font-size:10px;margin-left:6px">→ ${grp?grp.label:'?'}</span>
        </div>
        <button class="rm" onclick="removeGuestById('${g.id}')">Remove</button>
      </div>`;}).join('');

  document.getElementById('ma').innerHTML=`<div class="mbg" onclick="cm(event)"><div class="modal" onclick="event.stopPropagation()">

    <div class="form-label" style="margin-bottom:6px">Type</div>

      <button type="button" class="type-btn active" id="type-guest" onclick="selectGuestType('guest')">Regular guest</button>
      <button type="button" class="type-btn student" id="type-student" onclick="selectGuestType('student')">Student (50%)</button>
    </div>
    <div class="form-row"><input id="g-name" placeholder="Full name"/><input id="g-role" placeholder="Role (optional)"/></div>
    <div class="form-row"><select id="g-group">${opts}</select><button class="btn bp" onclick="addGuest()">Add</button></div>
    <div class="guest-list" id="guest-list">${items}</div>
    <div class="mbtns"><button class="btn" onclick="cm()">Close</button></div>
  </div></div>`;
}

let _guestType='guest';
function selectGuestType(type){
  _guestType=type;
  document.getElementById('type-guest').classList.toggle('active',type==='guest');
  document.getElementById('type-student').classList.toggle('active',type==='student');
}

function addGuest(){
  const name=document.getElementById('g-name').value.trim();
  const role=document.getElementById('g-role').value.trim();
  const groupId=document.getElementById('g-group').value;
  const isStudent=_guestType==='student';
  if(!name)return showToast('Enter a name');
  guests.push({id:'guest_'+Date.now(),name,role,groupId,isStudent});
  _guestType='guest';
  sd();openGuestModal(groupId);renderAll();
  showToast(name+' added'+(isStudent?' (student · 50%)':''));
}

function removeGuestById(id){
  const g=guests.find(x=>x.id===id);if(!g)return;
  const saved={...g};guests=guests.filter(x=>x.id!==id);sd();openGuestModal();renderAll();
  showToast(saved.name+' removed',()=>{guests.push(saved);sd();openGuestModal();renderAll();showToast(saved.name+' restored');});
}
